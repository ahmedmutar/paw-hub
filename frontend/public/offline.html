<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paw Hub — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f0fdfa; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .card { background: white; border-radius: 1.5rem; padding: 3rem 2rem; max-width: 400px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #0f766e; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button { background: #14b8a6; color: white; border: none; padding: 0.75rem 2rem; border-radius: 0.75rem; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #0f766e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐾</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Paw Hub membutuhkan koneksi internet untuk beroperasi. Periksa koneksi Anda dan coba lagi.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
